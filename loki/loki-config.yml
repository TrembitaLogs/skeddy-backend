# Loki 3.x single-binary configuration with S3-compatible backend (DO Spaces).
# Chunks and TSDB index both go to s3://${LOKI_S3_BUCKET}. Compactor enforces retention.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  aws:
    endpoint: ${LOKI_S3_ENDPOINT}
    region: ${LOKI_S3_REGION}
    bucketnames: ${LOKI_S3_BUCKET}
    access_key_id: ${AWS_ACCESS_KEY_ID}
    secret_access_key: ${AWS_SECRET_ACCESS_KEY}
    s3forcepathstyle: false

limits_config:
  retention_period: 720h
  allow_structured_metadata: true
  reject_old_samples: true
  reject_old_samples_max_age: 720h
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  max_query_series: 5000
  volume_enabled: true

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: s3

ruler:
  alertmanager_url: http://alertmanager:9093
  enable_api: true
  enable_alertmanager_v2: true
  evaluation_interval: 1m
  poll_interval: 1m
  storage:
    type: local
    local:
      directory: /etc/loki/rules
  rule_path: /tmp/loki-ruler
  ring:
    kvstore:
      store: inmemory

analytics:
  reporting_enabled: false
