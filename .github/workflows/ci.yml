name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.dockerignore'
      - '.github/CODEOWNERS'
      - '.vscode/**'
      - '.idea/**'
      - 'loki/**'
      - 'grafana/**'
      - 'alertmanager/**'
      - 'alert-bridge/**'
      - 'promtail/**'
      - 'nginx/**'
      - 'docker-compose*.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.dockerignore'
      - '.github/CODEOWNERS'
      - '.vscode/**'
      - '.idea/**'
      - 'loki/**'
      - 'grafana/**'
      - 'alertmanager/**'
      - 'alert-bridge/**'
      - 'promtail/**'
      - 'nginx/**'
      - 'docker-compose*.yml'
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Mypy
        run: uv run mypy app/

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Audit dependencies for vulnerabilities
        run: uv run pip-audit

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: skeddy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/skeddy_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-key-not-for-production
      JWT_ALGORITHM: HS256

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests with coverage
        run: uv run pytest
