name: skeddy-backend

services:
  db:
    image: postgres:17-alpine
    container_name: skeddy-db
    environment:
      POSTGRES_USER: skeddy
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: skeddy
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skeddy"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:8-alpine
    container_name: skeddy-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build: .
    container_name: skeddy-app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://skeddy:${DB_PASSWORD}@db:5432/skeddy
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - backupdata:/backups
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backup:
    image: postgres:17-alpine
    container_name: skeddy-backup
    user: "70"
    volumes:
      - ./scripts/backup-postgres.sh:/scripts/backup-postgres.sh:ro
      - backupdata:/backups
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: skeddy
      POSTGRES_USER: skeddy
      PGPASSWORD: ${DB_PASSWORD}
      BACKUP_RETENTION_DAYS: "7"
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-backups}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    command: >-
      sh -c '
      apk add --no-cache aws-cli >/dev/null 2>&1 &&
      chmod 750 /backups &&
      export -p > /tmp/backup.env &&
      echo "*/30 * * * * . /tmp/backup.env; sh /scripts/backup-postgres.sh >> /proc/1/fd/1 2>&1" > /var/spool/cron/crontabs/postgres &&
      crond -f -l 2
      '
    restart: always
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: grafana/loki:3.3.2
    container_name: skeddy-loki
    command: -config.file=/etc/loki/loki-config.yml -config.expand-env=true
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    environment:
      LOKI_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT}
      LOKI_S3_REGION: ${LOKI_S3_REGION:-sfo3}
      LOKI_S3_BUCKET: ${LOKI_S3_BUCKET:-skeddy-logs}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    restart: always
    networks:
      - logs
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:3.3.2
    container_name: skeddy-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtaildata:/tmp
    depends_on:
      - loki
    restart: always
    networks:
      - logs
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: skeddy-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://logs.skeddy.net
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    restart: always
    networks:
      - logs
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend:
    driver: bridge
  logs:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  backupdata:
  lokidata:
  promtaildata:
  grafanadata:
