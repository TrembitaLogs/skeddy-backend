global:
  resolve_timeout: 5m

route:
  receiver: telegram
  group_by: [alertname, container]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: "${TELEGRAM_BOT_TOKEN}"
        chat_id: ${TELEGRAM_CHAT_ID}
        api_url: https://api.telegram.org
        parse_mode: HTML
        message: |
          <b>[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}</b>
          Severity: {{ .CommonLabels.severity }}
          Container: {{ .CommonLabels.container }}
          {{ range .Alerts -}}
          ── {{ .Annotations.summary }}
          {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}
          {{ end }}
          <a href="https://logs.skeddy.net/explore">Open Grafana</a>
