<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Skeddy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            padding: 48px 32px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            font-weight: 700;
            color: #4A90D9;
            margin-bottom: 32px;
            letter-spacing: -1px;
        }

        .message {
            font-size: 18px;
            line-height: 1.5;
            color: #333;
            margin-bottom: 32px;
        }

        .download-btn {
            display: inline-block;
            background-color: #4A90D9;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 8px;
            margin-bottom: 32px;
            transition: background-color 0.2s;
        }

        .download-btn:hover {
            background-color: #3a7bc8;
        }

        .hint {
            font-size: 14px;
            line-height: 1.5;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Skeddy</div>
        <p class="message">To reset your password, please open this link in the Skeddy app.</p>
        <a class="download-btn" href="https://play.google.com/store/apps/details?id=net.skeddy.main">Download Skeddy</a>
        <p class="hint">If you already have the app installed, tap the link in your email again.</p>
    </div>
</body>
</html>
