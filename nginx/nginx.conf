worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'request_id=$request_id';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # --- Performance ---
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # --- Gzip compression for API responses ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml;

    # --- SSL shared settings ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- Upstream ---
    upstream app_backend {
        server app:8000;
        keepalive 32;
    }

    # ==========================================================
    # HTTP (port 80) — ACME challenge + redirect to HTTPS
    # ==========================================================
    server {
        listen 80;
        server_name api.beta.skeddy.net beta.skeddy.net admin.beta.skeddy.net;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==========================================================
    # HTTPS — API reverse proxy (api.beta.skeddy.net)
    # ==========================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name api.beta.skeddy.net;

        ssl_certificate     /etc/letsencrypt/live/beta.skeddy.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/beta.skeddy.net/privkey.pem;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        location / {
            proxy_pass http://app_backend;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_set_header Connection        "";

            proxy_http_version 1.1;
        }
    }

    # ==========================================================
    # HTTPS — Web resources (beta.skeddy.net)
    # Serves: assetlinks.json, password reset page, downloads
    # Extended by tasks 15.7 and 15.8
    # ==========================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name beta.skeddy.net;

        ssl_certificate     /etc/letsencrypt/live/beta.skeddy.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/beta.skeddy.net/privkey.pem;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        root /var/www/html;

        # Password reset fallback page (shown when Skeddy app is not installed).
        # Android App Links intercept this URL when the app IS installed.
        location = /reset-password {
            try_files /reset-password.html =404;
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }

    # ==========================================================
    # HTTPS — Admin panel (admin.beta.skeddy.net)
    # ==========================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name admin.beta.skeddy.net;

        ssl_certificate     /etc/letsencrypt/live/beta.skeddy.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/beta.skeddy.net/privkey.pem;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

        location / {
            proxy_pass http://app_backend;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_set_header Connection        "";

            proxy_http_version 1.1;
        }
    }
}
